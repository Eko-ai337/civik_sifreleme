<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>CIVIK ŞİFRELEME</title>
    <style>
        body {
            background-color: rgb(0, 0, 0);
            color: #00ff40;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            border: 2px solid rgb(0, 255, 149);
            padding: 30px;
            box-shadow: 0 0 50px rgb(0, 255, 149);
            background: rgba(0, 0, 0, 0.9);
            width: 400px;
            text-align: center;
        }
        textarea {
            width: 100%;
            background: #000000;
            color: #00ff41;
            border: 1px solid #00ff41;
            margin-bottom: 15px;
            padding: 10px;
            box-sizing: border-box;
        }
        button {
            background: #00ff41;
            color: black;
            border: none;
            padding: 10px 20px;
            cursor: pointer;
            font-weight: bold;
            margin: 5px;
            transition: 0.3s;
        }
        button:hover {
            background: rgb(0, 0, 0);
            color: white;
            box-shadow: 0 0 25px #00ff41;
        }
        #result {
            margin-top: 20px;
            word-wrap: break-word;
            font-size: 1.2em;
            color: #fff;
            text-shadow: 0 0 5px #00ff41;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>[ CIVIK ŞİFRELEME ]</h2>
    <textarea id="input" rows="4" placeholder="Metni buraya girin..."></textarea>
    <br>
    <button onclick="sifrele()">SİFRELE 🔒</button>
    <button onclick="coz()">DESİFRELE 🔓</button>
    <div id="result">Bekleniyor...</div>
</div>

<script>
    function sifrele() {
        let metin = document.getElementById("input").value;
        let sonuc = "";
        for (let i = 0; i < metin.length; i++) {
            let sifreli_deger = (metin.charCodeAt(i) * 11) % 127;
            sonuc += sifreli_deger.toString().padStart(3, '0');
        }
        document.getElementById("result").innerText = "SONUÇ: " + sonuc;
    }

    function coz() {
        let metin = document.getElementById("input").value;
        let sonuc = "";
        for (let i = 0; i < metin.length; i += 3) {
            let blok = metin.substr(i, 3);
            let c = parseInt(blok);
            let orijinal_ascii = (c * 104) % 127;
            sonuc += String.fromCharCode(orijinal_ascii);
        }
        document.getElementById("result").innerText = "METİN: " + sonuc;
    }
</script>

</body>
</html>
